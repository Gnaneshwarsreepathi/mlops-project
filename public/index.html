<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps AI Assistant — Trainer Rajinikanth Vadla</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #161b27 100%);
      border-bottom: 1px solid #30363d;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-info h1 {
      font-size: 16px; font-weight: 700; color: #f0f6fc;
      line-height: 1.2;
    }
    .header-info p {
      font-size: 12px; color: #8b949e; margin-top: 2px;
    }
    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: #3fb950;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Topic Badges ── */
    .topics {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 20px;
      background: #161b27;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }
    .topic-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .2s;
      user-select: none;
    }
    .topic-badge:hover { opacity: .85; transform: translateY(-1px); }
    .badge-mlops  { background: #1a3a5c; color: #58a6ff; border-color: #2563eb40; }
    .badge-aiops  { background: #1a3a2f; color: #3fb950; border-color: #2ea04340; }
    .badge-llmops { background: #3a1a3a; color: #bc8cff; border-color: #7c3aed40; }
    .badge-agents { background: #3a2a1a; color: #f0883e; border-color: #d2973240; }

    /* ── Chat Area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 820px;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .msg-icon {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; margin-top: 2px;
    }
    .msg.user .msg-icon { background: #21262d; }
    .msg.bot  .msg-icon { background: linear-gradient(135deg, #2563eb, #7c3aed); }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      max-width: calc(100% - 50px);
      line-height: 1.65;
      font-size: 14px;
    }
    .msg.user .bubble {
      background: #1a3a5c;
      border: 1px solid #2563eb40;
      border-bottom-right-radius: 4px;
      color: #e6edf3;
    }
    .msg.bot .bubble {
      background: #161b27;
      border: 1px solid #30363d;
      border-bottom-left-radius: 4px;
      color: #e6edf3;
    }

    /* Markdown inside bubbles */
    .bubble h1,.bubble h2,.bubble h3 {
      color: #58a6ff; margin: 12px 0 6px; font-size: 15px;
    }
    .bubble h1 { font-size: 17px; }
    .bubble p  { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12.5px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      color: #e6edf3;
    }
    .bubble pre {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      line-height: 1.55;
    }
    .bubble blockquote {
      border-left: 3px solid #2563eb;
      padding-left: 12px;
      color: #8b949e;
      margin: 8px 0;
    }
    .bubble strong { color: #f0f6fc; }
    .bubble em     { color: #bc8cff; }
    .bubble hr     { border-color: #30363d; margin: 10px 0; }
    .bubble a      { color: #58a6ff; }

    /* Signature line */
    .signature {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
      font-style: italic;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px; min-width: 60px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #58a6ff;
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* Welcome card */
    .welcome {
      text-align: center;
      padding: 32px 24px;
      max-width: 560px;
      margin: auto;
    }
    .welcome .icon { font-size: 52px; margin-bottom: 14px; }
    .welcome h2 { font-size: 22px; font-weight: 700; color: #f0f6fc; margin-bottom: 8px; }
    .welcome p  { font-size: 14px; color: #8b949e; line-height: 1.6; margin-bottom: 18px; }
    .starter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      text-align: left;
    }
    .starter-btn {
      background: #161b27;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 12.5px;
      color: #8b949e;
      cursor: pointer;
      transition: all .2s;
      text-align: left;
    }
    .starter-btn:hover {
      border-color: #2563eb;
      color: #58a6ff;
      background: #1a3a5c20;
    }
    .starter-btn .sq { font-size: 15px; display: block; margin-bottom: 4px; }

    /* ── Input Bar ── */
    .input-bar {
      background: #161b27;
      border-top: 1px solid #21262d;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #userInput {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      color: #e6edf3;
      resize: none;
      min-height: 44px;
      max-height: 130px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color .2s;
    }
    #userInput:focus  { border-color: #2563eb; }
    #userInput::placeholder { color: #484f58; }
    #sendBtn {
      width: 44px; height: 44px;
      border-radius: 11px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .2s, transform .1s;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn:hover:not(:disabled) { opacity: .88; transform: scale(1.04); }
    #sendBtn:disabled { opacity: .4; cursor: not-allowed; }

    .char-hint {
      font-size: 11px;
      color: #484f58;
      padding: 0 2px 2px 2px;
      text-align: right;
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .starter-grid { grid-template-columns: 1fr; }
      header { padding: 10px 14px; }
      .topics { padding: 8px 14px; }
      #chat { padding: 14px; }
      .input-bar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1>MLOps AI Assistant</h1>
    <p><span class="status-dot"></span>Powered by Gemini &nbsp;|&nbsp; Trainer: Rajinikanth Vadla</p>
  </div>
</header>

<!-- Topic Pills -->
<div class="topics">
  <span class="topic-badge badge-mlops"  onclick="insertTopic('MLOps')">⚙️ MLOps</span>
  <span class="topic-badge badge-aiops"  onclick="insertTopic('AIOps')">🔍 AIOps</span>
  <span class="topic-badge badge-llmops" onclick="insertTopic('LLMOps')">🧠 LLMOps</span>
  <span class="topic-badge badge-agents" onclick="insertTopic('AI Agents')">🤝 AI Agents</span>
</div>

<!-- Chat Messages -->
<div id="chat">
  <div class="welcome">
    <div class="icon">🎓</div>
    <h2>Welcome to your AI Learning Hub</h2>
    <p>Ask anything about <strong>MLOps</strong>, <strong>AIOps</strong>, <strong>LLMOps</strong>, or <strong>AI Agents</strong>.
       Your expert guide is ready.</p>
    <div class="starter-grid">
      <button class="starter-btn" onclick="sendStarter(this.dataset.q)" data-q="What is MLOps and why is it important in production ML?">
        <span class="sq">⚙️</span>What is MLOps and why is it important?
      </button>
      <button class="starter-btn" onclick="sendStarter(this.dataset.q)" data-q="Explain RAG (Retrieval-Augmented Generation) in LLMOps with an example.">
        <span class="sq">🧠</span>Explain RAG in LLMOps with an example
      </button>
      <button class="starter-btn" onclick="sendStarter(this.dataset.q)" data-q="How does AIOps improve IT incident management?">
        <span class="sq">🔍</span>How does AIOps improve IT operations?
      </button>
      <button class="starter-btn" onclick="sendStarter(this.dataset.q)" data-q="Compare ReAct agents vs multi-agent systems in AI Agents.">
        <span class="sq">🤝</span>ReAct agents vs multi-agent systems
      </button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div style="flex:1; display:flex; flex-direction:column; gap:4px;">
    <textarea
      id="userInput"
      placeholder="Ask about MLOps, AIOps, LLMOps, AI Agents…"
      rows="1"
      maxlength="4000"
    ></textarea>
    <div class="char-hint" id="charHint"></div>
  </div>
  <button id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
    &#9658;
  </button>
</div>

<script>
  const chatEl   = document.getElementById('chat');
  const inputEl  = document.getElementById('userInput');
  const sendBtn  = document.getElementById('sendBtn');
  const charHint = document.getElementById('charHint');
  let history    = [];   // [{role, content}]
  let welcomeRemoved = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
    const len = inputEl.value.length;
    charHint.textContent = len > 3500 ? `${len}/4000` : '';
  });

  // Enter = send, Shift+Enter = newline
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function insertTopic(topic) {
    const map = {
      'MLOps':     'Tell me about MLOps: ',
      'AIOps':     'Tell me about AIOps: ',
      'LLMOps':    'Tell me about LLMOps: ',
      'AI Agents': 'Tell me about AI Agents: ',
    };
    inputEl.value = map[topic] || topic + ': ';
    inputEl.focus();
  }

  function sendStarter(q) {
    inputEl.value = q;
    sendMessage();
  }

  function removeWelcome() {
    if (!welcomeRemoved) {
      const w = chatEl.querySelector('.welcome');
      if (w) w.remove();
      welcomeRemoved = true;
    }
  }

  function appendUserMsg(text) {
    removeWelcome();
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
      <div class="msg-icon">👤</div>
      <div class="bubble">${escapeHtml(text)}</div>`;
    chatEl.appendChild(div);
    scroll();
  }

  function appendTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-icon">🤖</div>
      <div class="bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
    chatEl.appendChild(div);
    scroll();
    return div;
  }

  function appendBotMsg(text) {
    const typingEl = document.getElementById('typing');
    if (typingEl) typingEl.remove();

    // Split signature from body
    const sigMarker = '---';
    let body = text;
    let sig  = '';
    const idx = text.lastIndexOf('\n' + sigMarker);
    if (idx !== -1) {
      body = text.slice(0, idx).trim();
      sig  = text.slice(idx + sigMarker.length + 1).trim();
    }

    const div = document.createElement('div');
    div.className = 'msg bot';

    let sigHtml = '';
    if (sig) {
      sigHtml = `<div class="signature">${marked.parseInline(sig)}</div>`;
    }

    div.innerHTML = `
      <div class="msg-icon">🤖</div>
      <div class="bubble">
        <div class="md-body">${marked.parse(body)}</div>
        ${sigHtml}
      </div>`;
    chatEl.appendChild(div);
    scroll();
  }

  function appendError(msg) {
    const typingEl = document.getElementById('typing');
    if (typingEl) typingEl.remove();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `
      <div class="msg-icon">⚠️</div>
      <div class="bubble" style="border-color:#f8514940; color:#f85149;">
        ${escapeHtml(msg)}
      </div>`;
    chatEl.appendChild(div);
    scroll();
  }

  function scroll() {
    chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;').replace(/\n/g,'<br>');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    charHint.textContent = '';
    sendBtn.disabled = true;

    appendUserMsg(text);
    appendTyping();

    history.push({ role: 'user', content: text });

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Unknown error' }));
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      appendBotMsg(data.reply);
      history.push({ role: 'model', content: data.reply });

      // Keep history bounded to last 20 turns
      if (history.length > 40) history = history.slice(-40);

    } catch (err) {
      history.pop(); // remove last user msg on error
      appendError('Error: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Focus input on load
  window.addEventListener('load', () => inputEl.focus());
</script>
</body>
</html>
